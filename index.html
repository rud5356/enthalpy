    :root {

      --bg: #fdf6ec;
      --card-bg: #fff;
      --text: #3a2f1e;
      --muted: #8a7a66;
      --radius: 18px;
      --shadow: 0 4px 18px rgba(0,0,0,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    header {
      text-align: center;
      padding: 52px 20px 36px;
      background: linear-gradient(160deg, #fff9f0 0%, #fdecd3 100%);
      border-bottom: 2px solid var(--secondary);
    }
    header .paw { font-size: 2rem; letter-spacing: 4px; }
    header h1 {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      margin: 8px 0 6px;
    }
    header p.sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      background: var(--primary);
      color: #fff;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── GRID ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }
    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 데스크톱: 5열 */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .cat-card {
      width: 166px;
      flex-shrink: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .cat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(244,160,74,.22);
      border-color: var(--primary);
    }
    .cat-card:active { transform: scale(.97); }
    .cat-card { -webkit-tap-highlight-color: transparent; }

    .cat-card .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .cat-card .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cat-card .photo-wrap .placeholder { font-size: 3.5rem; }
    .cat-card .card-info {
      padding: 10px 10px 12px;
      text-align: center;
    }
    .cat-card .card-name {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }
    .cat-card .card-breed {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .cat-card .card-gender {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
    }
    .cat-card .card-gender.f { background: #fde8f0; color: #d4558a; }
    .cat-card .card-gender.m { background: #e0eeff; color: #4a7fc1; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(.88); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .modal-photo img { width:100%; height:100%; object-fit:cover; }
    .modal-photo .placeholder { font-size: 6rem; }

    .modal-body { padding: 22px 24px 32px; }
    .modal-tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      border-bottom: 3px solid var(--primary);
      padding-bottom: 8px;
      margin-bottom: 14px;
    }
    .modal-rows { display: flex; flex-direction: column; gap: 10px; }
    .modal-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.95rem;
    }
    .modal-row .icon { font-size: 1.1rem; flex-shrink: 0; }
    .modal-row .label { color: var(--muted); white-space: nowrap; }
    .modal-row .val { font-weight: 600; }
    .stars { color: #f4a04a; letter-spacing: 1px; }

    .close-btn {
      position: absolute;
      top: 12px; right: 14px;
      background: rgba(0,0,0,.35);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:hover { background: rgba(0,0,0,.6); }

    footer {
      text-align: center;
      padding: 28px 20px;
      font-size: 0.82rem;
      color: var(--muted);
      border-top: 1px solid #eee;
    }

    /* ── 태블릿: 3열 ── */
    @media (max-width: 768px) {
      header { padding: 36px 16px 26px; }
      header p.sub { font-size: 0.9rem; }
      main { padding: 28px 16px 50px; }
      .cat-card { width: calc(33.33% - 11px); }
    }

    /* ── 모바일: 2열 + 바텀시트 모달 ── */
    @media (max-width: 480px) {
      header { padding: 28px 14px 22px; }
      header .paw { font-size: 1.5rem; }
      main { padding: 22px 14px 50px; }
      .grid { gap: 12px; }
      .cat-card { width: calc(50% - 6px); }
      .cat-card .card-name { font-size: 0.92rem; }

      /* 모달: 화면 하단에서 올라오는 바텀시트 */
      .overlay {
        align-items: flex-end;
        padding: 0;
      }
      .modal {
        border-radius: 24px 24px 0 0;
        max-width: 100%;
        max-height: 88vh;
        animation: slideUp .28s cubic-bezier(.34,1.3,.64,1);
      }
      @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      .modal-photo { aspect-ratio: 16 / 9; }
      .modal-body { padding: 18px 20px 36px; }
      .modal-name { font-size: 1.7rem; }
    }
  </style>
</head>

<div class="overlay" id="overlay" onclick="closeModal(event)">

  function stars(n) {
    if (typeof n !== "number" || isNaN(n)) return String(n);
    const clamped = Math.min(5, Math.max(0, Math.round(n)));
    return "★".repeat(clamped) + "☆".repeat(5 - clamped);
  }

    const card = document.createElement("div");
    card.className = "cat-card";
    card.onclick = () => openModal(i);

    const photoHTML = cat.photo
      ? `<img src="${cat.photo}" alt="${cat.name}" loading="lazy" />`
      : `<span class="placeholder">${cat.emoji}</span>`;

    const genderLabel = cat.gender === "f" ? "여아" : "남아";

      <div class="photo-wrap">${photoHTML}</div>
      <div class="card-info">
        <div class="card-name">${cat.name}</div>
        <div class="card-breed">${cat.breed}</div>

      : `<span class="placeholder">${cat.emoji}</span>`;

    document.getElementById("modalTagline").textContent = cat.tagline;
    document.getElementById("modalName").textContent = cat.name;

      <div class="modal-row">
        <span class="icon">❤️</span>
        <span class="label">친화력&nbsp;:</span>
        <span class="val stars">${stars(cat.friendly)}</span>
      </div>
      <div class="modal-row">
        <span class="icon">🐾</span>
        <span class="label">품종&nbsp;:</span>
        <span class="val">${cat.breed}</span>
      </div>
      <div class="modal-row">
        <span class="icon">👆</span>
        <span class="label" style="white-space:normal">${cat.desc}</span>
      </div>
    `;
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal(e) {
    if (e.target === overlay) {
      overlay.classList.remove("open");
      document.body.style.overflow = "";
    }
  }
  function closeModalBtn() {
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      overlay.classList.remove("open");
      document.body.style.overflow = "";
    }
  });
</script>
</body>
</html>
