<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냥글냥글 엔탈피</title>
  <style>
    :root {
      --primary: #f4a04a;
      --secondary: #f9c784;
      --bg: #fdf6ec;
      --card-bg: #fff;
      --text: #3a2f1e;
      --muted: #8a7a66;
      --radius: 18px;
      --shadow: 0 4px 18px rgba(0,0,0,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    header {
      text-align: center;
      padding: 52px 20px 36px;
      background: linear-gradient(160deg, #fff9f0 0%, #fdecd3 100%);
      border-bottom: 2px solid var(--secondary);
    }
    header .paw { font-size: 2rem; letter-spacing: 4px; }
    header h1 {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      margin: 8px 0 6px;
    }
    header p.sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      background: var(--primary);
      color: #fff;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    /* ── GRID ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }
    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }

    /* ── CAT CARD ── */
    .cat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .cat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(244,160,74,.22);
      border-color: var(--primary);
    }
    .cat-card .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .cat-card .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cat-card .photo-wrap .placeholder {
      font-size: 3.5rem;
    }
    .cat-card .card-info {
      padding: 10px 10px 12px;
      text-align: center;
    }
    .cat-card .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
    }
    .cat-card .card-breed {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .cat-card .card-gender {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
    }
    .cat-card .card-gender.f { background: #fde8f0; color: #d4558a; }
    .cat-card .card-gender.m { background: #e0eeff; color: #4a7fc1; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
      animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .modal-photo img { width:100%; height:100%; object-fit:cover; }
    .modal-photo .placeholder { font-size: 6rem; }

    .modal-body {
      padding: 22px 24px 28px;
    }
    .modal-tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      border-bottom: 3px solid var(--primary);
      padding-bottom: 8px;
      margin-bottom: 14px;
    }
    .modal-rows { display: flex; flex-direction: column; gap: 8px; }
    .modal-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.92rem;
    }
    .modal-row .icon { font-size: 1.1rem; flex-shrink: 0; }
    .modal-row .label { color: var(--muted); white-space: nowrap; }
    .modal-row .val { font-weight: 600; }
    .stars { color: #f4a04a; letter-spacing: 1px; }

    .close-btn {
      position: absolute;
      top: 12px; right: 14px;
      background: rgba(0,0,0,.35);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .close-btn:hover { background: rgba(0,0,0,.6); }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.82rem;
      color: var(--muted);
      border-top: 1px solid #eee;
    }
  </style>
</head>

    document.getElementById("modalName").textContent = cat.name;

    const genderLabel = cat.gender === "f" ? "여아 🎀" : "남아 💙";
    document.getElementById("modalRows").innerHTML = `
      <div class="modal-row">
        <span class="icon">👤</span>
        <span class="label">성별&nbsp;:</span>
        <span class="val">${genderLabel}</span>
      </div>
      <div class="modal-row">
        <span class="icon">❤️</span>
        <span class="label">친화력&nbsp;:</span>
        <span class="val stars">${stars(cat.friendly)}</span>
      </div>
      <div class="modal-row">
        <span class="icon">🐾</span>
        <span class="label">품종&nbsp;:</span>
        <span class="val">${cat.breed}</span>
      </div>
      <div class="modal-row">
        <span class="icon">👆</span>
        <span class="label" style="white-space:normal">${cat.desc}</span>
      </div>
    `;
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal(e) {
    if (e.target === overlay) {
      overlay.classList.remove("open");
      document.body.style.overflow = "";
    }
  }
  function closeModalBtn() {
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      overlay.classList.remove("open");
      document.body.style.overflow = "";
    }
  });
</script>
</body>
</html>
